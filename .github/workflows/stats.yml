name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=ZxcMimis&show_icons=true&bg_color=0D1117&title_color=A371F7&text_color=C9D1D9&icon_color=A371F7&border_color=A371F7
          path: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=ZxcMimis&layout=compact&bg_color=0D1117&title_color=A371F7&text_color=C9D1D9&icon_color=A371F7&border_color=A371F7
          path: top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "Update README cards" || exit 0
          git push
